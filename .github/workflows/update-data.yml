name: Update HM/TP data

# Refreshes data/ on the default branch — DL+CG snapshot, Hyperliquid Info
# API on-chain feeds, HM/TP compute, history append.
#
# Two tiers in one workflow (single workflow so two crons never race on push):
#   - every run (4-hourly): DL+CG snapshot, HYPE feeds, computes, validate, commit
#   - daily tier (the 00:15 UTC run, or any manual dispatch): the Alchemy
#     adapters, DL proxy feeds, CG price history, chain-GDP. These are all
#     daily-granularity sources — re-fetching them 6×/day bought nothing.
#     The Alchemy scripts also checkpoint their last-scanned block
#     (scripts/lib/scan-checkpoint.js), so each daily run scans ~2 days of
#     blocks instead of the full trailing window.
#
# Failure model: every network fetch step carries continue-on-error so one
# flaky API doesn't abort the whole refresh. Correctness is enforced by the
# "Validate pipeline output" gate before the commit — if core outputs
# (latest.json, HM/NP snapshots, HYPE buyback feed) are stale or malformed,
# the run fails and nothing ships. Compute steps stay hard-fail: they run on
# local data, so a failure there is a bug, not weather.
#
# Does NOT run the ASXN backfill (Cloudflare-Turnstile gated, manual JWT).
# Run that by hand when needed:
#   ASXN_JWT="eyJ..." node scripts/external/asxn-backfill.js
#   node scripts/external/asxn-merge.js

on:
  schedule:
    # Every 4 hours at :15 (00:15 run doubles as the daily tier). Dropped
    # from hourly on 2026-05-30 for GitHub Actions quota; with the daily tier
    # split the 4-hourly runs are now cheap if hourly is ever wanted again.
    - cron: '15 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine tier (daily steps run on the 00:15 UTC run + manual dispatch)
        id: tier
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(date -u +%H)" -lt 4 ]; then
            echo "daily=true" >> "$GITHUB_OUTPUT"
            echo "tier: daily (full refresh)"
          else
            echo "daily=false" >> "$GITHUB_OUTPUT"
            echo "tier: fast (DL+CG snapshot, HYPE feeds, computes only)"
          fi

      - name: Fetch DL+CG snapshot
        run: node scripts/fetch-data.js

      - name: HYPE on-chain — Assistance Fund buybacks (incremental)
        continue-on-error: true
        run: node scripts/onchain/hype/fetch-af.js

      - name: HYPE on-chain — circulating supply
        continue-on-error: true
        run: node scripts/onchain/hype/fetch-supply.js

      - name: HYPE on-chain — validator stake snapshot
        continue-on-error: true
        run: node scripts/onchain/hype/fetch-staking.js

      # ---------------------------------------------------------- daily tier

      - name: Daily price history (CoinGecko — merges into existing files; runs before the Alchemy adapters so they read the local price cache instead of re-hitting CG)
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        run: node scripts/external/fetch-cg-price-history.js --days 14

      - name: AAVE on-chain — Collector buyback flow (checkpointed)
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: node scripts/onchain/aave/fetch-collector.js --days 30

      - name: AAVE on-chain — Safety Module + Ecosystem Reserve snapshot
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: node scripts/onchain/aave/fetch-safety-module.js

      - name: SKY on-chain — Category B rewards farm (checkpointed)
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: node scripts/onchain/sky/fetch-rewards-farm.js --days 30

      - name: SKY on-chain — SBE + Splitter activity (checkpointed)
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: node scripts/onchain/sky/fetch-sbe.js --days 30

      - name: SKY on-chain — LockStake Engine total locked
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: node scripts/onchain/sky/fetch-lockstake.js

      - name: LIT on-chain — L1 supply + Escrow flow (checkpointed)
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: node scripts/onchain/lit/fetch-l1.js --days 30

      - name: LIT on-chain — zkLighter L2 market snapshot
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        run: node scripts/onchain/lit/fetch-l2-market.js

      - name: LIT buyback proxy (DefiLlama holdersRevenue)
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        run: node scripts/onchain/lit/fetch-buyback-proxy.js

      - name: Generic DL proxy buyback feeds (22 protocols — UNI, RAY, FLUID, EUL, CARDS, DYDX, GNS, ORCA, COW, ZRO, PUMP, JUP, MNDE, …)
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        run: node scripts/onchain/proxy/fetch-dl-buybacks.js

      - name: ETHFI buyback proxy (aggregates 3 DL sub-protocols × 10% accrual)
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        run: node scripts/onchain/proxy/fetch-etherfi-buybacks.js

      - name: Chain-GDP tracker (early-exits if today already done)
        if: steps.tier.outputs.daily == 'true'
        continue-on-error: true
        run: node scripts/chains/fetch-chain-gdp.js

      # ------------------------------------------------------- every run

      - name: Compute HM snapshot
        run: node scripts/hm/compute-hm.js

      - name: Compute TP snapshot
        run: node scripts/np/compute-np.js

      - name: Backfill HM time series
        run: node scripts/hm/backfill-hm-history.js --days 120

      - name: Append daily history
        run: node scripts/history/append-history.js

      - name: Prune dated snapshots/reports older than 30 days (latest.* untouched; deletions staged by the commit step's `git add data/`)
        if: steps.tier.outputs.daily == 'true'
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%F)
          shopt -s nullglob
          # Filename-date comparison, not mtime — actions/checkout resets mtimes.
          for f in data/hm/snapshots/20*.json data/np/snapshots/20*.json \
                   data/chains/snapshots/20*.json \
                   data/hm/reports/20*.md data/np/reports/20*.md; do
            d=$(basename "${f%.*}")
            if [[ "$d" < "$CUTOFF" ]]; then
              rm -f "$f" && echo "pruned $f"
            fi
          done

      - name: Validate pipeline output (gate — nothing ships if this fails)
        run: node scripts/lib/validate-pipeline.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update HM/TP data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
